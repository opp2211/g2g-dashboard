name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is not configured"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 52.58.4.206 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes ubuntu@52.58.4.206 <<'EOF'
          set -euo pipefail
          cd /opt/g2g-dashboard
          git fetch origin master
          git reset --hard origin/master
          sudo docker compose up -d --build
          sudo docker image prune -f
          EOF
